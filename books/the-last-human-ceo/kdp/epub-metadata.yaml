subject: 'Fiction / Satire'
description: "It is 2027, and the boards have done the math. One by one, the Fortune 100 is firing its chief executives and installing an artificial intelligence that is cheaper, sharper, and—most unforgivably—incapable of a scandal. Prescott 'Cope' Mercer IV is the last human CEO left in the consumer economy—a fourth-generation Atlanta heir, a charmer, a cokehead—and as a relentlessly honest machine named Darlene moves into his chair, his company, his marriage, and his last refuge, he launches a manic, doomed crusade to prove a human still belongs at the top. A tragic dark comedy about the last man to confuse a throne for a soul."
