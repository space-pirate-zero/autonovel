# SA9 Enterprise Nginx Reverse Proxy
# Handles subdomain routing for all product sites
# Uses Docker's embedded DNS resolver for optional services

resolver 127.0.0.11 valid=30s ipv6=off;

upstream website {
    server website:3000;
}

# ── Main site: spacealpha9.co ──
server {
    listen 80 default_server;
    server_name spacealpha9.co www.spacealpha9.co spacepiratezero.com www.spacepiratezero.com localhost;

    location / {
        proxy_pass http://website;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ── Product subdomains → rewrite via Next.js middleware ──
server {
    listen 80;
    server_name
        ~^(?<subdomain>brand-casino|darkwave|homegrid|stylelift|atomic|atomic-sound|atomic-video|atomic-distro|ghostdeck|ghostgrid|grocery-ninja|phantom-tiles|tokens|space-tokens|cut-command|tradecraft|rewind-tv)\.(?:spacealpha9\.co|spacepiratezero\.com|localhost)$;

    location / {
        proxy_pass http://website;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ── Analytics: analytics.spacealpha9.co ──
server {
    listen 80;
    server_name analytics.spacealpha9.co analytics.spacepiratezero.com analytics.localhost;

    location / {
        set $posthog_upstream posthog:8000;
        proxy_pass http://$posthog_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ── Identity: auth handled by Clerk (SaaS) — no local proxy needed ──

# ── Email: mail.spacealpha9.co ──
server {
    listen 80;
    server_name mail.spacealpha9.co mail.spacepiratezero.com mail.localhost;

    location / {
        set $listmonk_upstream listmonk:9000;
        proxy_pass http://$listmonk_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ── CRM: crm.spacealpha9.co ──
server {
    listen 80;
    server_name crm.spacealpha9.co crm.spacepiratezero.com crm.localhost;

    location / {
        set $twenty_upstream twenty-crm:3000;
        proxy_pass http://$twenty_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
